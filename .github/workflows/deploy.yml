name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2
  ECR_API: letreco-api
  ECR_WEB: letreco-web

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build -f apps/api/Dockerfile -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_API }}:latest .
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_API }}:latest

      - name: Build and push Web image
        run: |
          docker build -f apps/web/Dockerfile -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB }}:latest .
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB }}:latest

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/ec2-user/letreco/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,DATABASE_URL,API_JWT_SECRET
          script: |
            aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin $ECR_REGISTRY

            cd /home/ec2-user/letreco
            echo "ECR_REGISTRY=$ECR_REGISTRY" > .env
            echo "DATABASE_URL=$DATABASE_URL" >> .env
            echo "API_JWT_SECRET=$API_JWT_SECRET" >> .env

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
